services:
  postgres:
    image: postgres:16-alpine
    container_name: knowflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: knowflow
      POSTGRES_PASSWORD: knowflow
      POSTGRES_DB: knowflow
    ports:
      - "15432:5432"
    volumes:
      - knowflow-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowflow -d knowflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  knowflow-postgres-data:
